## Tiny debug: 1 train + 1 val + 1 test (see data/tiny_debug/mixture_1train_1val_1test.csv).
## Single-GPU only (batch_size=1). Use scripts/train_tiny_debug.sh or eval_tiny_debug.sh.

seed: 777
use_cuda: 1

speaker_no: 2
mix_lst_path: ./data/tiny_debug/mixture_1train_1val_1test.csv
mix_path_source: path_layout
audio_direc: /data/megastore/Projects/tianxiaowen/dataset/v2_extracted_wav_aligned_p50_withoutBGM
mixture_audio_direc: /data/megastore/Projects/tianxiaowen/dataset/v2_extracted_wav_aligned_p50_withoutBGM
reference_direc: /data/megastore/Datasets/FaceVideoData/opensource_dataset/DH-FaceVid-1K
audio_sr: 16000
ref_sr: 30
use_cached_visual: 1
visual_cache_root: /data/megastore/Projects/tianxiaowen/dataset/v2_visual_cache
allow_cache_miss_fallback_mp4: 1

num_workers: 0
pin_memory: 0
prefetch_factor: 2
batch_size: 1
accu_grad: 0
effec_batch_size: 1
max_length: 2
load_interferer_visual: 0
streaming_train: 1
streaming_eval: 1
streaming_val_match_train: 1
chunk_size_range: [8000, 8000]
history_len_range: [1600, 1600]
future_len_range: [0, 0]
streaming_multi_chunk: 1
streaming_chunk_hop: 8000
streaming_max_history: 1600
use_amp: 1
eval_first_n: 1
eval_sample_random: 0
debug_cuda_launch_blocking: 0
debug_batch_shapes: 0
debug_sync_cuda: 0

# Load weights from another run (same architecture). 'None' = scratch.
init_from: 'None'
causal: 1
path_layout: dh_flat

network_reference:
  cue: lip
  backbone: resnet18
  emb_size: 64
  resnet_stage_channels: [32, 64, 128, 256]
  conv3d_kernel: [3, 5, 5]
  use_adaptive_pool: 1
  visual_conv_hidden: 128
  resnet_out_channels: 256
  visual_pw_groups: 1

network_audio:
  backbone: av_mossformer2_tse
  encoder_kernel_size: 16
  encoder_out_nchannels: 64
  encoder_in_nchannels: 1
  masknet_inner_nchannels: 12
  stream_cache_enable: 0
  ref_stream_cache_enable: 0
  stream_block_frames: 400
  stream_overlap_frames: 256
  ref_stream_block_frames: 8
  ref_stream_overlap_frames: 32
  stream_cache_gate_every_hops: 1
  stream_cache_refresh_every_hops: 0
  stream_cache_debug: 0
  masknet_numspks: 1
  masknet_chunksize: 250
  masknet_numlayers: 1
  masknet_norm: "ln"
  masknet_useextralinearlayer: False
  masknet_extraskipconnection: True
  intra_numlayers: 8
  fsmn_inner_channels: 64
  intra_nhead: 8
  intra_dffn: 64
  intra_dropout: 0
  intra_use_positional: True
  intra_norm_before: True
  image_size: 64
  tcn_attractor: 0

loss_type: sisdr
init_learning_rate: 0.0001
lr_warmup: 1
lr_warmup_steps: 3000
max_epoch: 1
clip_grad_norm: 5
stop_on_nan: 1
save_every_n_train_samples: 0
